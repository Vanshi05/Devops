name: Sehat Connect CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci || npm install

      - name: Run backend tests
        working-directory: ./backend
        run: npm test -- --passWithNoTests

      - name: Check backend files
        run: |
          test -f backend/package.json
          test -f backend/src/server.js
          test -d backend/src/routes
          echo "Backend structure OK"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t sehat-frontend:${{ github.sha }} -t sehat-frontend:latest .

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t sehat-backend:${{ github.sha }} -t sehat-backend:latest .

      - name: Smoke test frontend container
        run: |
          docker run -d --name test-frontend -p 80:80 sehat-frontend:latest
          sleep 5
          curl -f http://localhost:80
          docker rm -f test-frontend

      - name: Smoke test backend container
        run: |
          docker run -d --name test-backend -p 8000:8000 sehat-backend:latest
          sleep 8
          curl -f http://localhost:8000/health || curl -f http://localhost:8000
          docker rm -f test-backend

  deploy:
    name: Deploy to EC2 with Ansible
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible
          ansible --version

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 400 ~/.ssh/ec2_key.pem

      - name: Create inventory
        run: |
          cat > ansible/inventory.ini <<INVEOF
          [ec2]
          ${{ secrets.EC2_PUBLIC_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/ec2_key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'

          [ec2:vars]
          ansible_python_interpreter=/usr/bin/python3
          INVEOF

      - name: Run deploy playbook
        run: |
          cd ansible
          ansible-playbook -i inventory.ini deploy.yml -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
